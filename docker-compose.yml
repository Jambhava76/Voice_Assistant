services:
  backend:
    build:
      context: .
      dockerfile: deploy/docker/backend.Dockerfile
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - voice_assistant_data:/app/data

  frontend:
    build:
      context: .
      dockerfile: deploy/docker/frontend.Dockerfile
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api/v1
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  voice_assistant_data:
