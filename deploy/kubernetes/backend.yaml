apiVersion: apps/v1
kind: Deployment
metadata:
  name: jarvis-backend
  labels:
    app: jarvis-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: jarvis-backend
  template:
    metadata:
      labels:
        app: jarvis-backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/your-org/jarvis-backend:latest
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: jarvis-backend-secrets
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: jarvis-backend
spec:
  selector:
    app: jarvis-backend
  ports:
    - port: 8000
      targetPort: 8000
