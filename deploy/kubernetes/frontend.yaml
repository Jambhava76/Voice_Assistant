apiVersion: apps/v1
kind: Deployment
metadata:
  name: jarvis-frontend
  labels:
    app: jarvis-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: jarvis-frontend
  template:
    metadata:
      labels:
        app: jarvis-frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/your-org/jarvis-frontend:latest
          ports:
            - containerPort: 3000
          env:
            - name: NEXT_PUBLIC_API_BASE_URL
              value: https://api.example.com/api/v1
---
apiVersion: v1
kind: Service
metadata:
  name: jarvis-frontend
spec:
  selector:
    app: jarvis-frontend
  ports:
    - port: 3000
      targetPort: 3000
